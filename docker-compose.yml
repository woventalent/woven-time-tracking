# Production traffic for time.woventalent.in is routed by an nginx container
# ("nginx-proxy", running --network host, config at
# /opt/alternative-ens-deployment/nginx.production.conf on the host — NOT the
# Caddy setup or the host's own /etc/nginx described elsewhere in this repo's
# history, both of which turned out to be unrelated) via an upstream named
# time_tracking. As of 2026-07-22 that upstream still points at PM2 on
# 127.0.0.1:3007, not this container — see issue history for the in-progress
# cutover. This container publishes on host port 3009 (NOT 3002 — 3002 is
# already claimed by a different upstream, salesforce_lens_web, on this same
# nginx; reusing it would make lens.nativeworld.com serve this app too).
# PM2 (ecosystem.config.cjs) is kept only as a fallback; do not repoint this
# container at a port already used by another upstream in that nginx config
# without checking it first.
services:
  app:
    build: .
    image: woven-time-tracking:latest
    container_name: woven-time-tracking
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/timetracking.db
      UPLOAD_DIR: /app/uploads
      PORT: 3000
    volumes:
      - db-data:/app/data
      - uploads-data:/app/uploads
    ports:
      - "3009:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Docker's own `restart: unless-stopped` only re-launches a container after it
  # exits — it does nothing for a process that's still running but wedged (health
  # check failing). autoheal watches container health status and force-restarts
  # anything Docker has marked unhealthy, so both failure modes are covered.
  autoheal:
    image: willfarrell/autoheal
    container_name: woven-time-tracking-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  db-data:
  uploads-data:
