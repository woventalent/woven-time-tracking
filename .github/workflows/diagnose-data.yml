name: Diagnose Production Data

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Write DB inspection script
        run: |
          cat > /tmp/inspect_db.js << 'EOF'
          const { DatabaseSync } = require('node:sqlite')
          const path = process.argv[2]
          const fs = require('fs')
          if (!fs.existsSync(path)) { console.log('no db file at ' + path); process.exit(0) }
          const db = new DatabaseSync(path, { readOnly: true })
          for (const t of ['users', 'workspaces', 'projects', 'timesheet_entries']) {
            try {
              const n = db.prepare('SELECT COUNT(*) AS c FROM ' + t).get().c
              console.log(t + ': ' + n)
            } catch (e) { console.log(t + ': ERROR ' + e.message) }
          }
          try {
            const r = db.prepare('SELECT MIN(date) AS a, MAX(date) AS b FROM timesheet_entries').get()
            console.log('timesheet date range: ' + r.a + ' to ' + r.b)
          } catch (e) {}
          EOF
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes /tmp/inspect_db.js root@${{ secrets.SSH_HOST }}:/tmp/inspect_db.js

      - name: List containers and volumes (read-only)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== ALL containers (including stopped) ===";
            docker ps -a --format "{{.ID}}  {{.Names}}  {{.Image}}  {{.Status}}  {{.Ports}}";
            echo;
            echo "=== ALL docker volumes ===";
            docker volume ls;
            echo;
            echo "=== currently running app container env (DB_PATH) ===";
            docker inspect woven-time-tracking --format "{{range .Config.Env}}{{println .}}{{end}}" 2>/dev/null | grep -i db_path || echo "container not found or not running";
            echo;
            echo "=== currently running app container mounts ===";
            docker inspect woven-time-tracking --format "{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}" 2>/dev/null || echo "container not found or not running";
            echo;
            echo "=== any timetracking.db files on the host filesystem outside Docker internals ===";
            find / -xdev -iname "timetracking.db*" -not -path "*/var/lib/docker/*" 2>/dev/null;
          '

      - name: Row counts for every db-data volume found
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            for vol in $(docker volume ls -q | grep -i db-data); do
              echo "--- volume: $vol ---";
              docker run --rm -v "$vol":/data:ro -v /tmp/inspect_db.js:/inspect.js:ro node:22-alpine node --experimental-sqlite /inspect.js /data/timetracking.db;
              echo;
            done
          '

      - name: Locate the exact active Caddyfile
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== all Caddyfile-ish files on host ===";
            find / -xdev -iname "Caddyfile*" -not -path "*/var/lib/docker/*" 2>/dev/null;
            echo;
            echo "=== is caddy a systemd service? ===";
            systemctl status caddy --no-pager 2>&1 | head -20 || echo "no systemd caddy service";
            echo;
            echo "=== caddy container (if containerized) ===";
            docker ps -a --filter "name=caddy" --format "{{.ID}} {{.Names}} {{.Status}}";
          '

      - name: Current live status (containers, ports, PM2, Caddy target)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== containers right now ===";
            docker ps -a --filter "name=time-tracking" --format "{{.ID}}  {{.Names}}  {{.Status}}  {{.Ports}}";
            echo;
            echo "=== what is listening on 3002, 3007, 3000 on the HOST (outside docker) ===";
            (ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null) | grep -E ":(3002|3007|3000)\b" || echo "nothing found via ss/netstat";
            echo;
            echo "=== is PM2 running at all? ===";
            pm2 list 2>/dev/null || echo "pm2 not installed or not running";
            echo;
            echo "=== time-tracking container env (DB_PATH, PORT) ===";
            docker inspect time-tracking --format "{{range .Config.Env}}{{println .}}{{end}}" 2>/dev/null | grep -iE "db_path|port" || echo "not found";
            echo;
            echo "=== time-tracking container recent logs ===";
            docker logs --tail 60 time-tracking 2>&1 || echo "no logs";
            echo;
            echo "=== Caddyfile (wherever it lives) ===";
            find / -xdev -iname "Caddyfile*" -not -path "*/var/lib/docker/*" 2>/dev/null -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null | grep -B2 -A2 -i "woventalent\|time-tracking\|300[0-9]" || echo "no Caddyfile match found";
          '

      - name: Row counts for host .db files found (PM2-era + alternative-ens-deployment)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            for f in /var/www/time-tracking/timetracking.db /opt/alternative-ens-deployment/time-tracking/data/timetracking.db /opt/alternative-ens-deployment/time-tracking/timetracking.db; do
              echo "--- file: $f ---";
              if [ -f "$f" ]; then
                dir=$(dirname "$f");
                base=$(basename "$f");
                docker run --rm -v "$dir":/data:ro -v /tmp/inspect_db.js:/inspect.js:ro node:22-alpine node --experimental-sqlite /inspect.js "/data/$base";
              else
                echo "file does not exist";
              fi
              echo;
            done

            echo "=== alternative-ens-deployment time-tracking directory listing ===";
            ls -la /opt/alternative-ens-deployment/time-tracking/ 2>/dev/null || echo "directory not found";
            echo;
            echo "=== alternative-ens-deployment compose file (if any) ===";
            cat /opt/alternative-ens-deployment/time-tracking/docker-compose.yml 2>/dev/null || cat /opt/alternative-ens-deployment/docker-compose.yml 2>/dev/null || echo "no compose file found at either path";
            echo;
            echo "=== inspect the stopped alternative-ens-deployment time-tracking container ===";
            docker inspect time-tracking --format "ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} Error={{.State.Error}} FinishedAt={{.State.FinishedAt}}";
            docker inspect time-tracking --format "{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}";
            docker inspect time-tracking --format "{{range .NetworkSettings.Ports}}{{.}}{{end}}" ;
            docker port time-tracking 2>/dev/null || echo "no published ports (container stopped)";
          '
