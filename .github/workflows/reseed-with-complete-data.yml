name: Re-seed Docker volume with the complete dataset (fixes missing entries incl. Danial K)

on:
  workflow_dispatch:

jobs:
  reseed:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Backup the currently-seeded (incomplete) volume before overwriting
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            mkdir -p /root/pm2-to-docker-backup
            docker run --rm -v time-tracking_db-data:/data:ro -v /root/pm2-to-docker-backup:/backup alpine cp /data/timetracking.db /backup/timetracking.db.preComplete.bak
            ls -la /root/pm2-to-docker-backup/
          '

      - name: Re-seed db-data and uploads-data from the complete (alternative-ens-deployment) copy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            docker stop woven-time-tracking 2>/dev/null || echo "already stopped / not found";

            echo "=== copying the complete db into the volume ===";
            docker run --rm -v time-tracking_db-data:/data -v /opt/alternative-ens-deployment/time-tracking/data:/src:ro alpine cp /src/timetracking.db /data/timetracking.db;

            echo "=== copying the complete uploads into the volume ===";
            docker run --rm -v time-tracking_uploads-data:/data -v /opt/alternative-ens-deployment/time-tracking/uploads:/src:ro alpine sh -c "cp -r /src/. /data/ 2>/dev/null || echo no-uploads";

            echo "=== volume contents after re-seeding ===";
            docker run --rm -v time-tracking_db-data:/data alpine ls -la /data;
          '

      - name: Start the Docker container with the complete data
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} \
            "cd /var/www/time-tracking && docker compose up -d --remove-orphans"

      - name: Wait for healthy and verify complete data (25 projects, 76 entries, Danial K present)
        run: |
          cat > /tmp/verify.js << 'EOF'
          const { DatabaseSync } = require('node:sqlite')
          const db = new DatabaseSync('/data/timetracking.db', { readOnly: true })
          for (const t of ['users', 'workspaces', 'projects', 'timesheet_entries']) {
            console.log(t + ': ' + db.prepare('SELECT COUNT(*) AS c FROM ' + t).get().c)
          }
          const danial = db.prepare("SELECT id FROM users WHERE name = 'Danial K'").get()
          const n = db.prepare('SELECT COUNT(*) AS c FROM timesheet_entries WHERE user_id = ?').get(danial.id).c
          console.log('Danial K entries: ' + n)
          EOF
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes /tmp/verify.js root@${{ secrets.SSH_HOST }}:/tmp/verify.js
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            for i in $(seq 1 24); do
              status=$(docker inspect --format="{{.State.Health.Status}}" woven-time-tracking 2>/dev/null || echo "starting")
              echo "health check $i/24: $status"
              if [ "$status" = "healthy" ]; then break; fi
              if [ "$status" = "unhealthy" ]; then
                docker logs --tail 100 woven-time-tracking
                exit 1
              fi
              sleep 5
            done
            curl -s http://localhost:3002/api/health; echo
            docker run --rm -v time-tracking_db-data:/data:ro -v /tmp/verify.js:/v.js:ro node:22-alpine node --experimental-sqlite /v.js
          '
