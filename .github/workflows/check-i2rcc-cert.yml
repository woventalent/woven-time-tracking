name: Check i-2-rcc.woventalent.in cert issue (read-only, unrelated to our app)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Check the cert file and nginx error log history (read-only)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== does the i-2-rcc.woventalent.in cert file exist? ===";
            ls -la /etc/letsencrypt/live/i-2-rcc.woventalent.in/ 2>&1 || echo "DIRECTORY MISSING";
            echo;
            echo "=== cert expiry (if it exists) ===";
            openssl x509 -in /etc/letsencrypt/live/i-2-rcc.woventalent.in/fullchain.pem -noout -dates 2>&1 || echo "cannot read cert";
            echo;
            echo "=== nginx-proxy error log, last 40 lines (any i-2-rcc or cert errors, before/after todays reload) ===";
            docker logs nginx-proxy --tail 200 2>&1 | grep -iE "i-2-rcc|cert|ssl" | tail -40 || echo "no matching lines";
            echo;
            echo "=== is the rcc-api process (port 4000) actually up? ===";
            curl -s -o /dev/null -w "localhost:4000 HTTP %{http_code}\n" --max-time 5 http://localhost:4000/ || echo "connection failed";
            pm2 list | grep -i rcc || echo "no rcc pm2 process";
          '
