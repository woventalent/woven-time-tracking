name: Definitively locate the router for time.woventalent.in (read-only)

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Read the REAL nginx-proxy config and its live parsed state
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== full contents of the real source config (line-numbered) ===";
            cat -n /opt/alternative-ens-deployment/nginx.production.conf;
            echo;
            echo "=== the time.woventalent.in block specifically, from the running containers own nginx -T ===";
            docker exec nginx-proxy nginx -T 2>/dev/null | awk "/server_name[^;]*time\.woventalent\.in/{f=1} f{print} f&&/^}/{f=0; print \"---\"}";
            echo;
            echo "=== nginx -t inside the real container (config syntax check, read-only) ===";
            docker exec nginx-proxy nginx -t 2>&1;
            echo;
            echo "=== is there also a prism.woventalent.in block, for comparison? ===";
            grep -n -A15 "prism.woventalent.in" /opt/alternative-ens-deployment/nginx.production.conf | head -25;
          '
