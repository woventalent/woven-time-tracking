name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (CI sanity check — the Docker image builds its own)
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude '*.db' \
            --exclude '*.db-shm' \
            --exclude '*.db-wal' \
            --exclude .env \
            --exclude uploads \
            --exclude .git \
            --exclude .github \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ root@${{ secrets.SSH_HOST }}:/var/www/time-tracking/

      - name: Free port 3002 if held by a container outside this Compose project
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "Containers currently publishing 3002:"
            docker ps --filter "publish=3002" --format "{{.ID}}  {{.Names}}  {{.Image}}"
            stale=$(docker ps -q --filter "publish=3002")
            if [ -n "$stale" ]; then
              echo "Stopping container(s) holding port 3002 so this deploy can rebind it: $stale"
              docker stop $stale
            else
              echo "Port 3002 is free."
            fi
          '

      - name: Build and restart the app container
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} \
            "cd /var/www/time-tracking && docker compose up -d --build --remove-orphans"

      - name: Wait for the container to report healthy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            for i in $(seq 1 24); do
              status=$(docker inspect --format="{{.State.Health.Status}}" woven-time-tracking 2>/dev/null || echo "starting")
              echo "health check $i/24: $status"
              if [ "$status" = "healthy" ]; then exit 0; fi
              if [ "$status" = "unhealthy" ]; then
                echo "--- container logs ---"
                docker logs --tail 100 woven-time-tracking
                exit 1
              fi
              sleep 5
            done
            echo "Timed out waiting for a healthy status"
            docker logs --tail 100 woven-time-tracking
            exit 1
          '
