name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude '*.db' \
            --exclude '*.db-shm' \
            --exclude '*.db-wal' \
            --exclude .env \
            --exclude uploads \
            --exclude .git \
            --exclude .github \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ root@${{ secrets.SSH_HOST }}:/var/www/time-tracking/

      - name: Install production dependencies & restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} \
            "fuser -k 3001/tcp 2>/dev/null || true; sleep 1; cd /var/www/time-tracking && npm install --omit=dev --silent && (pm2 restart woven-time-tracking --update-env || pm2 start ecosystem.config.cjs) && pm2 save; docker start $(docker ps -aq --filter status=exited --filter name=caddy) 2>/dev/null || true"
