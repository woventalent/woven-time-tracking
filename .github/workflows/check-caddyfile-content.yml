name: Check live Caddyfile content (read-only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Find the default_server block catching time.woventalent.in
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== grep default_server across all nginx config ===";
            nginx -T 2>/dev/null | grep -n -B3 "default_server";
            echo;
            echo "=== full contents of sites-enabled/alternative-ens ===";
            cat -n /etc/nginx/sites-enabled/alternative-ens;
            echo;
            echo "=== is alternative-ens the one nginx -T reports as the source for the default_server block? ===";
            nginx -T 2>/dev/null | grep -n "configuration file";
          '
