name: Check live Caddyfile content (read-only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Read the real host nginx config for time.woventalent.in (read-only)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== nginx -T (full effective config), filtered to the time.woventalent.in server block ===";
            nginx -T 2>/dev/null | awk "/server_name[^;]*time\.woventalent\.in/{f=1} f{print} f&&/^}/{f=0; print \"---\"}";
            echo;
            echo "=== which config FILES define server_name time.woventalent.in ===";
            grep -rl "time.woventalent.in" /etc/nginx/ 2>/dev/null || echo "no file matched under /etc/nginx";
            echo;
            echo "=== full listing of sites-enabled / conf.d ===";
            ls -la /etc/nginx/sites-enabled/ 2>/dev/null;
            ls -la /etc/nginx/conf.d/ 2>/dev/null;
            echo;
            echo "=== nginx -t (config syntax check, read-only) ===";
            nginx -t 2>&1;
          '
