name: Check live Caddyfile content (read-only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Confirm whether SSH_HOST is even the box behind time.woventalent.in
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== hostname ===";
            hostname; hostname -I 2>/dev/null;
            echo;
            echo "=== public IP as seen by this host ===";
            curl -s --max-time 10 https://ifconfig.me || curl -s --max-time 10 https://api.ipify.org || echo "could not determine public IP";
            echo;
            echo "=== does curl to localhost:443 with the right Host header hit our app? ===";
            curl -sk --max-time 10 -H "Host: time.woventalent.in" https://localhost/api/health; echo;
            echo;
            echo "=== ALL nginx server_name directives on this host (every site) ===";
            nginx -T 2>/dev/null | grep -i "server_name" ;
          '
