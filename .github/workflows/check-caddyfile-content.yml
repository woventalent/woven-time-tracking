name: Check live Caddyfile content (read-only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Check letsencrypt certs and nginx.conf includes for hidden config
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== letsencrypt live domains (definitive list of certs actually issued) ===";
            ls -la /etc/letsencrypt/live/ 2>/dev/null || echo "no letsencrypt live dir";
            echo;
            echo "=== nginx.conf include directives ===";
            grep -n "include" /etc/nginx/nginx.conf;
            echo;
            echo "=== any other nginx install / process on this host? (search whole filesystem for nginx binaries) ===";
            find / -xdev -iname "nginx" -type f 2>/dev/null;
            echo;
            echo "=== full process list for anything containing nginx or 3007 or the app ===";
            ps aux | grep -iE "nginx|3007" | grep -v grep;
            echo;
            echo "=== full raw nginx -T dump (small enough to just read directly) ===";
            nginx -T 2>&1;
          '
