name: Check live Caddyfile content (read-only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Find what actually terminates TLS on 443 and its real config
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@${{ secrets.SSH_HOST }} '
            echo "=== what is listening on 443 / 80 on the HOST ===";
            (ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null) | grep -E ":(443|80)\b" || echo "nothing found via ss/netstat";
            echo;
            echo "=== all docker containers publishing 443 or 80 ===";
            docker ps -a --filter "publish=443" --format "{{.ID}}  {{.Names}}  {{.Status}}  {{.Ports}}";
            docker ps -a --filter "publish=80" --format "{{.ID}}  {{.Names}}  {{.Status}}  {{.Ports}}";
            echo;
            echo "=== ALL running containers (full list, unfiltered) ===";
            docker ps --format "{{.ID}}  {{.Names}}  {{.Image}}  {{.Ports}}";
            echo;
            echo "=== is there an nginx anywhere? ===";
            docker ps -a --filter "name=nginx" --format "{{.ID}} {{.Names}} {{.Status}}";
            systemctl status nginx --no-pager 2>&1 | head -10 || echo "no systemd nginx";
            which nginx caddy 2>/dev/null || echo "no host-level nginx/caddy binary";
            echo;
            echo "=== any process on the host (outside docker) bound to 443 ===";
            lsof -i :443 2>/dev/null || echo "lsof not available or nothing found";
          '
